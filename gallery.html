<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Edits - Akash Prajapati</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f172a;
            color: #fff;
        }

        .container {
            min-height: 100vh;
            padding: 40px 60px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #8b5cf6;
            border-radius: 50%;
        }

        .line {
            width: 120px;
            height: 2px;
            background: #8b5cf6;
        }

        .title {
            font-size: 70px;
            font-weight: 900;
            color: #8b5cf6;
            margin-bottom: 10px;
        }

        .subtitle {
            max-width: 500px;
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #111827;
            transition: .4s;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card:hover {
            transform: scale(1.03);
            border: 2px solid #8b5cf6;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, #000);
            padding: 20px;
        }

        .overlay h3 {
            color: #8b5cf6;
        }

        /* Collage Layout */
        .card.big {
            grid-row: span 2;
        }

        .hero-image {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Banner Buttons */

        .side-nav {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }

        .nav-btn {
            width: 45px;
            height: 45px;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            transition: .3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .3);
        }

        .nav-btn:hover {
            background: #8b5cf6;
            transform: translateX(-5px);
        }

        .nav-btn.active {
            background: #8b5cf6;
        }

        @media (max-width:1024px) {

            .container {
                padding: 30px 40px;
            }

            .title {
                font-size: 50px;
            }

            .hero-image {
                height: 60vh;
            }

            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

        }

        @media (max-width:768px) {

            .container {
                padding: 25px 20px;
            }

            .header {
                margin-bottom: 20px;
            }

            .title {
                font-size: 38px;
            }

            .subtitle {
                font-size: 14px;
                max-width: 100%;
            }

            .hero-image {
                height: 50vh;
            }


            .side-nav {
                bottom: 20px;
                top: auto;
                right: 50%;
                transform: translateX(50%);
                flex-direction: row;
                background: #111827;
                padding: 10px;
                border-radius: 30px;
            }


            .gallery {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card.big {
                grid-row: auto;
            }

            .card {
                height: auto;
            }

        }

        @media (max-width:480px) {

            .container {
                padding: 20px 15px;
            }

            .title {
                font-size: 30px;
            }

            .subtitle {
                font-size: 13px;
                line-height: 20px;
            }

            .hero-image {
                height: 35vh;
            }

            .overlay h3 {
                font-size: 14px;
            }

            .card {
                border-radius: 10px;
            }

        }


        @media (max-width:360px) {

            .title {
                font-size: 26px;
            }

            .hero-image {
                height: 30vh;
            }

            .subtitle {
                font-size: 12px;
            }

        }
    </style>

</head>
<body>

                <a href="Skills.html" class="nav-btn" title="Skills"><i class="fas fa-code"></i></a>
                <a href="https://apcode-dev.github.io/Portfolio01/" class="nav-btn"><i class="fas fa-briefcase"></i></a>

                <a href="https://www.linkedin.com/in/akash-s-prajapati-76238931a/" class="nav-btn" target="_blank"

                <a href="https://www.instagram.com/ap.code.in/" class="nav-btn" target="_blank" title="Instagram">

                <a href="contact.html" class="nav-btn" title="Contact">

            </div>

        </div>
        <div class="gallery">

            <div class="card big">

</body>

</html>
